; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m

board_build.arduino.earlephilhower.usb_manufacturer = GrieferPig
board_build.arduino.earlephilhower.usb_product = Picontrol
board_build.arduino.earlephilhower.usb_vid = 0xABCD
board_build.arduino.earlephilhower.usb_pid = 0x1337

build_flags =
	-DUSE_TINYUSB
	-DDEBUG_RP2040_PORT=Serial
	-DCFG_TUSB_CONFIG_FILE=\"tusb_config_picontrol.h\"
	-Iinclude/
	-DPICONTROL_FW_VERSION="\"0.0.1\""
	-DDEBUG_MODULE_MESSAGES
lib_deps = fortyseveneffects/MIDI Library@^5.0.2

upload_port = COM37
